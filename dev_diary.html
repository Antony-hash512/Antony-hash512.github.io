<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник разработки | YouTube Previewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .markdown-body {
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 1.1rem;
        }
        .markdown-body h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #fff, var(--accent-arch), var(--accent-rust));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .markdown-body h2 {
            font-size: 1.8rem;
            margin-top: 35px;
            margin-bottom: 15px;
            color: var(--accent-arch);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 8px;
        }
        .markdown-body h3 {
            font-size: 1.4rem;
            margin-top: 25px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        .markdown-body ul {
            list-style-type: none;
            padding-left: 20px;
            margin-bottom: 20px;
        }
        .markdown-body ul li {
            position: relative;
            margin-bottom: 12px;
        }
        .markdown-body ul li::before {
            content: '▹';
            position: absolute;
            left: -20px;
            color: var(--accent-rust);
        }
        .markdown-body strong {
            color: #fff;
            font-weight: 600;
        }
        .markdown-body code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--accent-neon);
        }
        .markdown-body p {
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            color: var(--text-primary);
            transform: translateX(-5px);
        }
        .raw-link {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            transition: color 0.2s;
        }
        .raw-link:hover {
            color: var(--accent-neon);
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="blob"></div>
    <div class="blob blob-2"></div>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
            <a href="index.html" class="back-btn">← На главную</a>
            <a href="dev_diary.md" class="raw-link" target="_blank">📄 Raw Markdown</a>
        </div>
        
        <section class="card" id="content">
            <div id="markdown-content" class="markdown-body">
                Загрузка дневника разработки...
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('dev_diary.md')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Не удалось загрузить файл');
                    }
                    return response.text();
                })
                .then(text => {
                    document.getElementById('markdown-content').innerHTML = marked.parse(text);
                })
                .catch(error => {
                    document.getElementById('markdown-content').innerHTML = `<p style="color: #ff5555;">Ошибка загрузки: ${error.message}</p>`;
                    console.error('Error fetching markdown:', error);
                });
        });

        // Эффект наведения на карточку
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
</body>
</html>
