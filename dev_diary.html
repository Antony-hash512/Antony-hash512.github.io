<!DOCTYPE html>
<html lang="ru" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник разработки | YouTube Previewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .markdown-body {
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 1.1rem;
        }
        .markdown-body h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #fff, var(--accent-arch), var(--accent-rust));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .markdown-body h2 {
            font-size: 1.8rem;
            margin-top: 35px;
            margin-bottom: 15px;
            color: var(--accent-arch);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 8px;
        }
        .markdown-body h3 {
            font-size: 1.4rem;
            margin-top: 25px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        .markdown-body ul {
            list-style-type: none;
            padding-left: 20px;
            margin-bottom: 20px;
        }
        .markdown-body ul li {
            position: relative;
            margin-bottom: 12px;
        }
        .markdown-body ul li::before {
            content: '▹';
            position: absolute;
            left: -20px;
            color: var(--accent-rust);
        }
        .markdown-body strong {
            color: #fff;
            font-weight: 600;
        }
        .markdown-body code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--accent-neon);
        }
        .markdown-body p {
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            color: var(--text-primary);
            transform: translateX(-5px);
        }
        .raw-link {
            font-size: 1.1rem;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .raw-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-neon);
            color: var(--accent-neon);
            transform: translateY(-2px);
        }
        .lang-switcher {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
        }
        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: var(--accent-arch);
            color: white;
        }
        .video-container {
            margin-bottom: 30px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            opacity: 0;
        }
        .video-container.expanded {
            max-height: 1000px;
            opacity: 1;
            margin-top: 20px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-toggle-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            width: fit-content;
        }
        .video-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-arch);
        }
        .video-toggle-btn .icon {
            transition: transform 0.3s ease;
        }
        .video-toggle-btn.active .icon {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="blob"></div>
    <div class="blob blob-2"></div>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
            <a href="index.html" class="back-btn" id="ui-back">← На главную</a>
            
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="lang-switcher">
                    <button class="lang-btn active" onclick="setLanguage('ru')" id="btn-ru">RU</button>
                    <button class="lang-btn" onclick="setLanguage('en')" id="btn-en">EN</button>
                </div>
                <a href="dev_diary.md" class="raw-link" target="_blank" id="ui-raw">📄 Raw Markdown</a>
            </div>
        </div>
        
        <section class="card" id="content">
            <button class="video-toggle-btn" onclick="toggleVideo()" id="ui-video-btn">
                <span class="icon">▼</span>
                <span id="ui-video-text">Show Video</span>
            </button>

            <div class="video-container" id="video-container">
                <div class="video-wrapper">
                    <iframe id="yt-iframe" src="" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
            </div>

            <div id="markdown-content" class="markdown-body">
                Загрузка...
            </div>
        </section>
    </main>

    <script>
        let currentLang = 'ru';

        const translations = {
            ru: {
                back: '← На главную',
                raw: '📄 Raw Markdown',
                videoShow: '📽️ Показать видео',
                videoHide: '📽️ Скрыть видео',
                loading: 'Загрузка дневника разработки...',
                file: 'dev_diary.md',
                title: 'Дневник разработки | YouTube Previewer'
            },
            en: {
                back: '← Back to Home',
                raw: '📄 Raw Markdown',
                videoShow: '📽️ Show Video',
                videoHide: '📽️ Hide Video',
                loading: 'Loading development diary...',
                file: 'dev_diary_en.md',
                title: 'Development Diary | YouTube Previewer'
            }
        };

        function toggleVideo() {
            const container = document.getElementById('video-container');
            const btn = document.getElementById('video-toggle-btn');
            const iframe = document.getElementById('yt-iframe');
            const isExpanded = container.classList.toggle('expanded');
            
            document.getElementById('ui-video-btn').classList.toggle('active');
            
            // Lazy load iframe src
            if (isExpanded && !iframe.src) {
                iframe.src = "https://www.youtube.com/embed/zoRkIV6Nd8A";
            }
            
            updateVideoBtnText();
        }

        function updateVideoBtnText() {
            const container = document.getElementById('video-container');
            const isExpanded = container.classList.contains('expanded');
            const textKey = isExpanded ? 'videoHide' : 'videoShow';
            document.getElementById('ui-video-text').innerText = translations[currentLang][textKey];
        }

        function setLanguage(lang, updateURL = true) {
            currentLang = lang;
            
            // Update URL without reloading
            if (updateURL) {
                const newURL = window.location.protocol + "//" + window.location.host + window.location.pathname + '?lang=' + lang;
                window.history.pushState({ path: newURL }, '', newURL);
            }
            
            // Update UI
            document.getElementById('html-tag').lang = lang;
            document.getElementById('ui-back').innerText = translations[lang].back;
            document.getElementById('ui-raw').innerText = translations[lang].raw;
            document.getElementById('ui-raw').href = translations[lang].file;
            document.title = translations[lang].title;
            updateVideoBtnText();
            
            // Update buttons
            document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            loadMarkdown(translations[lang].file);
        }

        function loadMarkdown(filename) {
            const contentDiv = document.getElementById('markdown-content');
            contentDiv.innerHTML = translations[currentLang].loading;

            fetch(filename)
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load');
                    return response.text();
                })
                .then(text => {
                    contentDiv.innerHTML = marked.parse(text);
                })
                .catch(error => {
                    contentDiv.innerHTML = `<p style="color: #ff5555;">Error: ${error.message}</p>`;
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Check URL parameters for language
            const urlParams = new URLSearchParams(window.location.search);
            const langParam = urlParams.get('lang');
            
            if (langParam && translations[langParam]) {
                setLanguage(langParam, false);
            } else {
                loadMarkdown(translations[currentLang].file);
            }
        });

        // Эффект наведения на карточку
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
</body>
</html>
